spring:
  profiles:
    active: dev
  application:
    name: Apboa
  servlet:
    multipart:
      max-file-size: 30MB # 单个文件最大 30MB
      max-request-size: 100MB # 请求总大小最大 100MB（假设最多3个30MB文件）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 同一轮由模型发起的独立工具默认并行执行；有严格顺序要求的部署可显式关闭
apboa:
  tool:
    parallel: ${APBOA_TOOL_PARALLEL:true}
