<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apboa Next 使用手册</title>
    <style>
      /* 遮罩层样式 */
      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f7;
      }

      .loader {
        width: 42px;
        height: 42px;
        border: 4px solid rgba(40, 120, 255, 0.16);
        border-top-color: #2878ff;
        border-right-color: #7b42e8;
        border-radius: 50%;
        animation: fly-spin 0.75s linear infinite;
      }

      @keyframes fly-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="doc-app">
      <div class="loading-overlay">
        <div class="loader" aria-label="Apboa Next 加载中"></div>
      </div>
    </div>
    <script type="module" src="/src/doc/main.ts"></script>
  </body>
</html>
