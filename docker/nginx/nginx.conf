# ==================== 限流策略 ====================
# API 请求限流：每个 IP 每秒最多 50 个请求，突发容量 80
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
# API 请求限流（低频）：每个 IP 每秒最多 20 个请求，突发容量 40
limit_req_zone $binary_remote_addr zone=api_low_limit:10m rate=20r/s;
# 并发连接数限制：每个 IP 最多 100 个并发连接
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen       80;
    server_name  localhost;

    client_max_body_size 100m;

    # 字符集
    charset utf-8;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;

    # 全局并发连接数限制
    limit_conn conn_limit 100;
    limit_conn_status 503;
    limit_req_log_level warn;

    # ==================== 前端静态资源 ====================
    # 主应用：/web/ 路径
    location /web/ {
        alias /usr/share/nginx/html/web/;
        index index.html;
        try_files $uri $uri/ /web/index.html;
    }

    # /doc.html路径重定向到 /web/doc/doc.html
    location = /doc.html {
        return 301 /web/doc/doc.html;
    }

    # 根路径重定向到 /web/
    location = / {
        return 301 /web/;
    }

    # ==================== API 代理 ====================
    # runtime API：/api/runtime/ → runtime（剥离 /api 前缀）
    # 必须放在 /api/ 之前，Nginx 按最长前缀匹配
    location /api/runtime/ {
        # 请求限流：每秒 50 个，突发 80 个，超出立即拒绝
        limit_req zone=api_limit burst=80 nodelay;

        proxy_pass http://${RUNTIME_HOST}:${RUNTIME_PORT}/runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }
    # runtime API：/api/ws/ → websocket（剥离 /api 前缀）
    # 必须放在 /api/ 之前，Nginx 按最长前缀匹配
    location /api/ws/ {
        proxy_pass http://${WEBSOCKET_HOST}:${WEBSOCKET_PORT}/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # console API：/api/agent/ → console（剥离 /api 前缀）
    location /api/agent/ {
        # 请求限流：每秒 50 个，突发 80 个，超出立即拒绝
        limit_req zone=api_limit burst=80 nodelay;

        proxy_pass http://apboa-console:3060/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # console API：/api/ → console（剥离 /api 前缀）
    # 平台身份断言 JWKS 公钥端点（docs/identity-propagation-design.md §5）：
    # 业务方系统经此验签工具调用断言。console 无宿主机端口映射，必须经本代理暴露
    location = /.well-known/jwks.json {
        proxy_pass http://apboa-console:3060/.well-known/jwks.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        # 请求限流：每秒 20 个，突发 40 个，超出立即拒绝
        # 使用低频限流作为兜底，具体 API 路径（/api/runtime/、/api/agent/）已有更高配额
        limit_req zone=api_low_limit burst=40 nodelay;

        proxy_pass http://apboa-console:3060/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 兼容旧路径：/web/api/runtime/ → runtime（剥离 /web/api 前缀）
    location /web/api/runtime/ {
        # 请求限流：每秒 50 个，突发 80 个，超出立即拒绝
        limit_req zone=api_limit burst=80 nodelay;

        proxy_pass http://${RUNTIME_HOST}:${RUNTIME_PORT}/runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 兼容旧路径：/web/api/ → console（剥离 /web/api 前缀）
    location /web/api/ {
        # 请求限流：每秒 50 个，突发 100 个，超出立即拒绝（兜底限流）
        limit_req zone=api_low_limit burst=40 nodelay;

        proxy_pass http://apboa-console:3060/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ==================== AgentScope AG-UI ====================
    location /runtime/agui/ {
        proxy_pass http://${RUNTIME_HOST}:${RUNTIME_PORT}/runtime/agui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
